  // Schablone auf Anfangszustand zurücksetzen
  document.getElementById('puzzleSchablone').src = 'assets/Fortbildung/Bluetenaufbau_Schablone1.png';
  document.getElementById('puzzleCompleteBtn').classList.remove('visible');

  _pzUpdateStep();
  document.getElementById('puzzleOverlay').classList.add('open');
}

function closePuzzle() {
  document.getElementById('puzzleOverlay').classList.remove('open');
  if (_pzDragEl) { _pzDragEl.remove(); _pzDragEl = null; }
}

// Aktualisiert Sprechblase, Teile-Zustände und Fortschritts-Punkte
function _pzUpdateStep() {
  const step = puzzleSteps[_pzStep];

  document.getElementById('puzzleBubble').textContent = step.tip;

  document.querySelectorAll('.puzzle-piece').forEach(el => {
    const id = el.id.replace('pz-', '');
    if (_pzPlaced.has(id)) {
      el.className = 'puzzle-piece placed';
    } else if (step.pieces.includes(id)) {
      el.className = 'puzzle-piece active-piece';
    } else {
      el.className = 'puzzle-piece blocked-piece';
    }
  });

  const dots = document.getElementById('puzzleProgDots');
  dots.innerHTML = puzzleSteps.map((_, i) => {
    let cls = 'puzzle-prog-dot';
    if (i < _pzStep)      cls += ' done';
    else if (i === _pzStep) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function _pzPointerDown(e) {
  const piece = e.currentTarget;
  if (piece.classList.contains('blocked-piece') || piece.classList.contains('placed')) return;
  e.preventDefault();

  _pzDragId = piece.id.replace('pz-', '');
  const rect = piece.getBoundingClientRect();

  // Klon erzeugen, der dem Finger / der Maus folgt
  _pzDragEl = document.createElement('div');
  _pzDragEl.className = 'puzzle-dragging';
  _pzDragEl.innerHTML = `<img src="assets/Fortbildung/${_pzDragId}.png" draggable="false" alt="">`;
  _pzDragEl.style.left = (rect.left) + 'px';
  _pzDragEl.style.top  = (rect.top)  + 'px';
  document.body.appendChild(_pzDragEl);

  piece.style.opacity = '0'; // Original während des Ziehens ausblenden

  document.addEventListener('pointermove', _pzPointerMove, { passive: false });
  document.addEventListener('pointerup',   _pzPointerUp);
}

function _pzPointerMove(e) {
  if (!_pzDragEl) return;
  e.preventDefault();
  // Klon mittig unter Zeiger / Finger
  _pzDragEl.style.left = (e.clientX - 45) + 'px';
  _pzDragEl.style.top  = (e.clientY - 45) + 'px';

  // Dropzone hervorheben wenn Zeiger drüber ist
  const dz   = document.getElementById('puzzleDropZone').getBoundingClientRect();
  const over = e.clientX > dz.left && e.clientX < dz.right &&
               e.clientY > dz.top  && e.clientY < dz.bottom;
  document.getElementById('puzzleDropZone').classList.toggle('drop-active', over);
}

function _pzPointerUp(e) {
  document.removeEventListener('pointermove', _pzPointerMove);
  document.removeEventListener('pointerup',   _pzPointerUp);
  if (!_pzDragEl) return;

  _pzDragEl.remove();
  _pzDragEl = null;
  document.getElementById('puzzleDropZone').classList.remove('drop-active');

  const dz      = document.getElementById('puzzleDropZone').getBoundingClientRect();
  const dropped = e.clientX > dz.left && e.clientX < dz.right &&
                  e.clientY > dz.top  && e.clientY < dz.bottom;
  const piece   = document.getElementById('pz-' + _pzDragId);

  if (dropped) {
    _pzPlaced.add(_pzDragId);
    // Teil ausblenden – die neue Schablone zeigt ihn bereits platziert
    if (piece) piece.className = 'puzzle-piece placed';

    const step = puzzleSteps[_pzStep];
    const allPlaced = step.pieces.every(id => _pzPlaced.has(id));

    if (allPlaced) {
      // Schablone zur nächsten Stufe wechseln
      setTimeout(() => {
        document.getElementById('puzzleSchablone').src = step.schablone;
        if (_pzStep < puzzleSteps.length - 1) {
          _pzStep++;
          _pzUpdateStep();
        } else {
          _pzShowSolution();
        }
      }, 400);
    } else {
      _pzUpdateStep();
    }
  } else {
    if (piece) piece.style.opacity = '';
  }
}

function _pzShowSolution() {
  // Alle Fortschritts-Punkte grün
  document.getElementById('puzzleProgDots').innerHTML =
    puzzleSteps.map(() => `<div class="puzzle-prog-dot done"></div>`).join('');

  // Florin feiert – die Schablone ist jetzt bereits die vollständige Loesung.png
  document.getElementById('puzzleBubble').textContent =
    'Perfekt! Du kennst jetzt alle Teile einer Blüte: Kelchblätter, Kronblätter, Staubblätter und den Stempel. Sehr gut gemacht!';

  launchConfetti();

  // Abschluss-Button nach kurzer Pause einblenden
  setTimeout(() => {
    document.getElementById('puzzleCompleteBtn').classList.add('visible');
  }, 1800);
}

// Benutzer wählt eine Option — Tree-Navigation oder Familienabgleich
function handleQuizChoice(optionId) {
  const node = quizTree[quizState.node];
  const opt  = node.options.find(o => o.id === optionId);
  if (!opt) return;

  const newPath = [...quizState.path, optionId];

  // Sonderoption: Florin löst die Pflanze direkt auf
  if (opt.special) {
    _showQuizReveal();
    return;
  }

  // Weiterleitung auf nächste Stufe
  if (opt.next) {
    quizState = { node: opt.next, path: newPath };
    renderQuizPage();
    return;
  }

  // Endknoten: Familie der Pflanze mit der gewählten Familie abgleichen
  const p = plants[currentPlantForQuiz];
  if (familyMatches(p.family, opt.family)) {
    _showQuizSuccess(opt);
  } else {
    _showQuizRetry(opt);
  }
}

// ---- Foto-Kachel: Touch-Swipe ----
function quizPhotoNav(dir) {
  quizPhotoZoomed = false;
  quizPhotoIndex  = (quizPhotoIndex + dir + GALLERY_TOTAL) % GALLERY_TOTAL;
  _updateQuizPhoto();
}

function quizTouchStart(e) {
  _quizTouchStartX = e.touches[0].clientX;
}
function quizTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - _quizTouchStartX;
  if (Math.abs(dx) > 42) {
    quizPhotoZoomed = false;
    quizPhotoIndex  = (quizPhotoIndex + (dx < 0 ? 1 : -1) + GALLERY_TOTAL) % GALLERY_TOTAL;
    _updateQuizPhoto();
  }
}

// ---- Foto-Kachel: Doppeltipp-Zoom ----
function quizPhotoTap(e) {
  const now = Date.now();
  if (now - _quizLastTap < 320) {
    quizPhotoZoomed = !quizPhotoZoomed;
    _updateQuizPhoto();
  }
  _quizLastTap = now;
}

function _updateQuizPhoto() {
  const img  = document.getElementById('quizPhotoImg');
  const lbl  = document.getElementById('quizPhotoLabel');
  const hint = document.getElementById('quizZoomHint');
  if (!img) return;

  const placeholder = document.getElementById('quizPhotoPlaceholder');
  if (quizPhotoIndex === 0) {
    img.style.display   = '';
    img.style.transform = quizPhotoZoomed ? 'scale(2.5) translateY(-8%)' : 'scale(1.0)';
    img.style.filter    = '';
    img.style.outline   = '';
    if (placeholder) placeholder.style.display = 'none';
    if (lbl) lbl.textContent = 'Pflanzenmodell';
  } else {
    img.style.display = 'none';
    if (placeholder) placeholder.style.display = 'flex';
    const photo = galleryPhotos[quizPhotoIndex - 1];
    if (lbl) lbl.textContent = photo.label + ' · Eigenes Foto';
  }
  if (hint) hint.textContent = quizPhotoZoomed ? '× Verkleinern' : '⊕ Einzoomen';
  document.querySelectorAll('.quiz-photo-dot').forEach((d, i) =>
    d.classList.toggle('active', i === quizPhotoIndex));
}

// Extrahiert den wissenschaftlichen Namen aus Klammern:
// "Hülsenfrüchtler (Fabaceae)" → "Fabaceae"
function familyMatches(plantFamilyStr, scientificName) {
  const m = plantFamilyStr.match(/\(([^)]+)\)/);
  return m && m[1].trim() === scientificName.trim();
}

function completeIdentification(id) {
  const p = plants[id];
  basket = basket.filter(x => x !== id);
  if (!herbarium.includes(id)) herbarium.push(id);
  plants[id].inHerbarium = true;
  currentPlantForQuiz = basket[0] || null;
  totalXP += p.xp;
  updateBadge();
  updateTopBar();
  renderTodos();
  renderPins();
  // Neu freigeschaltete Trophäen anzeigen & Bestäuber starten
  equipmentItems.forEach(item => {
    if (item.isUnlocked() && !item._wasUnlocked) {
      item._wasUnlocked = true;
      setTimeout(() => showTrophyUnlock(item), 2400);
    }
  });
  pollinatorDefs.forEach(def => {
    if (def.isUnlocked() && !_pollinatorTimers[def.id]) _schedulePollinatorFlight(def);

// ==================== HERBARIUM ====================
function herbCard(id, inHerb) {
  const p = plants[id];
  const exists = !!p;
  const locked = !exists || !inHerb;
  return `<div class="herb-card ${locked ? 'locked' : ''}" data-id="${id}"
               onclick="${!locked ? `showPlantPopup('${id}')` : ''}">
    <div class="herb-emoji">${inHerb && exists
      ? `<img src="${p.plantImg}" alt="${p.name}" class="herb-plant-img">`
      : `<i data-lucide="lock" style="width:24px;height:24px;color:rgba(100,80,60,0.35)"></i>`
    }</div>
    <div class="herb-name">${inHerb && exists ? p.name : '???'}</div>
  </div>`;
}

function renderHerbarium() {
  // ---- Welten tab ----
  const weltenEl = document.getElementById('herb-tab-welten');
  if (weltenEl) {
    weltenEl.innerHTML = worldGroups.map((group, gi) => {
      const headerIcon = group.iconImg
        ? `<img src="${group.iconImg}" alt="" style="width:20px;height:20px;object-fit:contain;opacity:0.9">`
        : '';
      const cards = group.plantIds.map(id => herbCard(id, herbarium.includes(id))).join('');
      return `
        <div style="font-size:13px;font-weight:800;color:${group.colorLabel};
                    margin-bottom:9px;${gi > 0 ? 'margin-top:18px;' : ''}
                    display:flex;align-items:center;gap:5px">
          ${headerIcon} ${group.name}
        </div>
        <div class="herb-grid">${cards}</div>`;
    }).join('');
    lucide.createIcons();
  }

  // ---- Familien tab ----
  const famEl = document.getElementById('herb-tab-familien');
  if (!famEl) return;
  const famMap = {};
  herbarium.forEach(id => {
    const p = plants[id];
    if (!p) return;
    if (!famMap[p.family]) famMap[p.family] = [];
    famMap[p.family].push(id);
  });
  if (Object.keys(famMap).length === 0) {
    famEl.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);font-weight:600">
      Noch keine Pflanzen bestimmt!
    </div>`;
  } else {
    famEl.innerHTML = Object.entries(famMap).map(([fam, ids]) => `
      <div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:800;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:5px">
          <img src="assets/icons/Blatt.png" alt="" style="width:17px;height:17px;object-fit:contain;opacity:0.75">
          ${fam}
          <span style="color:var(--muted);font-weight:600">(${ids.length})</span>
        </div>
        <div class="herb-grid">
          ${ids.map(id => {
            const p = plants[id];
            return `<div class="herb-card" onclick="showPlantPopup('${id}')">
              <div class="herb-emoji"><img src="${p.plantImg}" alt="${p.name}" class="herb-plant-img"></div>
              <div class="herb-name">${p.name}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`).join('');
    lucide.createIcons();
  }
  updateTopBar();
}

function switchHerbTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

function launchConfetti() {
  const colors = ['#4caf50','#f9a825','#e91e63','#1976d2','#ef6c00','#9c27b0','#00bcd4'];
  for (let i = 0; i < 26; i++) {

      left:${5 + Math.random() * 90}%;

      animation-delay:${Math.random() * 0.65}s;
      animation-duration:${2 + Math.random() * 1.2}s;
      transform:rotate(${Math.random() * 360}deg);
      border-radius:${Math.random() > 0.5 ? '50%' : '3px'};

      height:${8 + Math.random() * 8}px;

    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function renderWeltenOverlay() {
  const world      = worldDefs.find(w => w.active);
  const discovered = herbarium.filter(id => world.plants.includes(id));
  const N          = world.plants.length;

  // ---- Plants fixed on sphere surface, rotate with globe ----
  // Varied radii + angles so plants look naturally scattered on the sphere.
  // No counter-rotation → they tumble as the globe spins.
  const ORBIT_CX = 110, ORBIT_CY = 110;
  // Predefined positions (angle offset °, radius px, size px) for up to 8 plants
  const slots = [
    { angleDeg:  20, r: 78, size: 46 },
    { angleDeg: 100, r: 68, size: 40 },
    { angleDeg: 175, r: 80, size: 44 },
    { angleDeg: 250, r: 72, size: 42 },
    { angleDeg: 320, r: 60, size: 38 },
    { angleDeg:  60, r: 55, size: 36 },
    { angleDeg: 145, r: 50, size: 34 },
    { angleDeg: 290, r: 85, size: 48 },
  ];
  const orbitItemsHtml = world.plants
    .filter(id => discovered.includes(id))
    .map((id, i) => {
      const slot    = slots[i % slots.length];
      const angle   = slot.angleDeg * Math.PI / 180;
      const cx      = ORBIT_CX + slot.r * Math.cos(angle);
      const cy      = ORBIT_CY + slot.r * Math.sin(angle);
      const p       = plants[id];
      const half    = slot.size / 2;
      // Rotate so the plant's bottom always points toward globe centre
      const initRot = slot.angleDeg + 90;
      return `<img src="${p.plantImg}" alt="${p.name}" class="welten-orbit-plant"
               style="left:${cx}px;top:${cy}px;width:${slot.size}px;height:${slot.size}px;
                      margin-left:-${half}px;margin-top:-${half}px;
                      transform-origin:center center;transform:rotate(${initRot}deg)">`;
    }).join('');

  // ---- Central icon – sun stays upright via counter-rotation ----
  const coreHtml = world.iconImg
    ? `<img src="${world.iconImg}" alt="${world.name}" class="welten-planet-core">`
    : `<i data-lucide="${world.iconLucide}" class="welten-planet-core"
          style="width:38px;height:38px;color:${world.iconLucideColor}"></i>`;

  // ---- Inactive worlds – coloured orbs only, no icons yet ----
  const inactiveHtml = worldDefs.filter(w => !w.active).map(w => `
    <div class="welten-mini-world" onclick="showSeasonInfo('${w.id}')">
      <div class="welten-mini-planet" style="background:${w.miniColor}"></div>
      <div class="welten-mini-label">${w.name}</div>
    </div>`).join('');

  document.getElementById('weltenOverlayContent').innerHTML = `
    <div class="welten-popup-title">Welten</div>
    <div class="welten-active-section">
      <div class="welten-orbit-ring">
        <div class="welten-planet" style="background:${world.bg}"></div>
        ${coreHtml}
        ${orbitItemsHtml}
      </div>
      <div class="welten-world-name">${world.name}</div>
    </div>
    <div class="welten-inactive-section">
      <div class="welten-inactive-label">Weitere Welten</div>
      <div class="welten-inactive-row">${inactiveHtml}</div>
    </div>
  `;
  lucide.createIcons();
}

function showSeasonInfo(id) {

  if (!world) return;

}
